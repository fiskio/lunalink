name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pyright src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group test
      - run: uv run pytest

  test-cpp:
    name: C++ Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake -B build/cpp-tests -S . -G Ninja -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build/cpp-tests --parallel
      - name: Test
        run: ctest --test-dir build/cpp-tests --output-on-failure --parallel

  sanitize:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - name: Configure
        run: >
          cmake -B build/sanitize -S . -G Ninja
          -DBUILD_PYTHON_BINDINGS=OFF
          -DBUILD_TESTING=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build/sanitize --parallel
      - name: Test
        run: ctest --test-dir build/sanitize --output-on-failure --parallel

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install tools
        run: sudo apt-get install -y ninja-build clang-tidy
      - name: Configure (generate compile_commands.json)
        run: >
          cmake -B build/tidy -S . -G Ninja
          -DBUILD_PYTHON_BINDINGS=OFF
          -DBUILD_TESTING=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - name: Run clang-tidy
        # cpp/bindings/ is excluded — pybind11 template instantiations
        # generate unavoidable noise with the strict check set.
        # cpp/tests/ is excluded — third-party frameworks like Catch2
        # trigger flight-safety violations.
        run: >
          find cpp/ -name '*.cpp' ! -path '*/bindings/*' ! -path 'cpp/tests/*'
          | xargs clang-tidy -p build/tidy

  coverage-cpp:
    name: C++ Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install tools
        run: sudo apt-get install -y ninja-build lcov
      - name: Configure
        run: >
          cmake -B build/coverage -S . -G Ninja
          -DBUILD_PYTHON_BINDINGS=OFF
          -DBUILD_TESTING=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DENABLE_COVERAGE=ON
      - name: Build
        run: cmake --build build/coverage --parallel
      - name: Test
        run: ctest --test-dir build/coverage --output-on-failure --parallel
      - name: Collect coverage
        run: |
          lcov --capture \
               --directory build/coverage \
               --base-directory "$GITHUB_WORKSPACE" \
               --output-file coverage.info \
               --gcov-tool gcov \
               --ignore-errors source,gcov \
               --rc geninfo_unexecuted_blocks=1
          lcov --remove coverage.info \
               '/usr/*' '*/catch2*' '*/FetchContent*' '*/_deps/*' '*/cpp/tests/*' \
               --output-file coverage.info
          lcov --summary coverage.info || true
      - name: Enforce ≥ 90% line coverage
        run: |
          summary="$(lcov --summary coverage.info || true)"
          echo "$summary"
          line_pct="$(printf '%s\n' "$summary" | sed -n 's/^[[:space:]]*lines\.*:[[:space:]]*\([0-9.]\+\)%.*/\1/p')"
          if [ -z "$line_pct" ]; then
            echo "Failed to parse line coverage from lcov summary."
            exit 1
          fi
          awk -v pct="$line_pct" 'BEGIN { exit (pct >= 90.0) ? 0 : 1 }'

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run sphinx-build -b html docs/ docs/_build/html -W
