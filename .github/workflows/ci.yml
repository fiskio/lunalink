name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check src/

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run pytest

  test-cpp:
    name: C++ Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - name: Configure
        run: cmake -B build/cpp-tests -S . -G Ninja -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build/cpp-tests --parallel
      - name: Test
        run: ctest --test-dir build/cpp-tests --output-on-failure --parallel

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run sphinx-build -b html docs/ docs/_build/html -W
