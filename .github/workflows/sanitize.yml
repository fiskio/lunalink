name: Sanitizers

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  sanitize:
    name: Sanitizers (ASan + UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Ninja
        run: sudo apt-get install -y ninja-build
      - uses: arduino/setup-task@v2
      - run: task sanitize
