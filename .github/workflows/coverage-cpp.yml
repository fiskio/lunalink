name: C++ Coverage

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  coverage-cpp:
    name: C++ Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install tools
        run: sudo apt-get install -y ninja-build
      - uses: arduino/setup-task@v2
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: task coverage-cpp
