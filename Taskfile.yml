version: '3'

tasks:
  install:
    desc: Install or update project dependencies.
    cmd: uv sync --group dev

  build:
    desc: Force recompile the C++ extension.
    cmd: uv sync --group dev --reinstall-package lunalink

  install-hooks:
    desc: Install git hooks for pre-commit checks.
    cmds:
      - git config core.hooksPath .githooks
      - echo "Git hooks installed. Pre-commit checks will run automatically."

  test:
    desc: Rebuild C++ extension, then run C++ and Python tests.
    cmds:
      - task: build
      - task: test-cpp
      - task: test-py
    silent: false

  test-py:
    desc: Run Python tests.
    cmd: uv run python -m pytest

  test-cpp:
    desc: Build and run C++ unit tests with CTest (uses Ninja if available).
    vars:
      GENERATOR:
        sh: which ninja >/dev/null 2>&1 && echo "Ninja" || echo "Unix Makefiles"
      BUILD_DIR:
        sh: which ninja >/dev/null 2>&1 && echo "build/cpp-tests-ninja" || echo "build/cpp-tests-make"
    cmds:
      - cmake -B {{.BUILD_DIR}} -S . -G "{{.GENERATOR}}" -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug
      - cmake --build {{.BUILD_DIR}} --parallel
      - ctest --test-dir {{.BUILD_DIR}} --output-on-failure --parallel
    silent: false

  lint:
    desc: Run all static analysis tools (type checking, linting, formatting).
    cmds:
      - task: pyright
      - task: ruff-fix
    silent: false

  lint-check:
    desc: Run non-mutating lint checks used by CI and pre-commit.
    cmds:
      - task: pyright
      - uv run ruff format --check .
      - uv run ruff check .
    silent: false

  pyright:
    desc: Run type checking with pyright.
    cmd: uv run pyright src/

  ruff-fix:
    desc: Run ruff to format and lint with auto-fix.
    cmds:
      - uv run ruff format .
      - uv run ruff check . --fix
    silent: false

  coverage-cpp:
    desc: Build and run C++ tests with coverage, then generate HTML report.
    vars:
      GENERATOR:
        sh: which ninja >/dev/null 2>&1 && echo "Ninja" || echo "Unix Makefiles"
    cmds:
      - cmake -B build/coverage -S . -G "{{.GENERATOR}}" -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug -DENABLE_COVERAGE=ON
      - cmake --build build/coverage --parallel
      - ctest --test-dir build/coverage --output-on-failure --parallel
      - uv run python -m gcovr -r . build/coverage --html-details build/coverage/coverage.html --print-summary --fail-under-line 90 --exclude '.*catch2.*' --exclude 'build/coverage/_deps/.*' --exclude 'cpp/tests/.*' --gcov-ignore-errors=source_not_found --gcov-ignore-errors=output_error --gcov-ignore-errors=no_working_dir_found
    silent: false

  sanitize:
    desc: Build and run C++ tests with AddressSanitizer and UBSan.
    vars:
      GENERATOR:
        sh: which ninja >/dev/null 2>&1 && echo "Ninja" || echo "Unix Makefiles"
    cmds:
      - cmake -B build/sanitize -S . -G "{{.GENERATOR}}" -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZERS=ON
      - cmake --build build/sanitize --parallel
      - ctest --test-dir build/sanitize --output-on-failure --parallel
    silent: false

  tidy:
    desc: Run clang-tidy static analysis on C++ core (requires clang-tidy).
    env:
      SDKROOT:
        sh: command -v xcrun >/dev/null 2>&1 && xcrun --show-sdk-path || true
    vars:
      GENERATOR:
        sh: which ninja >/dev/null 2>&1 && echo "Ninja" || echo "Unix Makefiles"
      TIDY_JOBS:
        sh: |
          if command -v sysctl >/dev/null 2>&1 && [ -n "$(sysctl -n hw.ncpu 2>/dev/null)" ]; then
            sysctl -n hw.ncpu 2>/dev/null
          elif command -v nproc >/dev/null 2>&1; then
            nproc
          else
            echo 4
          fi
      CLANG_TIDY:
        sh: |
          if command -v clang-tidy >/dev/null 2>&1; then
            command -v clang-tidy
          elif [ -x /opt/homebrew/opt/llvm/bin/clang-tidy ]; then
            echo /opt/homebrew/opt/llvm/bin/clang-tidy
          elif [ -x /usr/local/opt/llvm/bin/clang-tidy ]; then
            echo /usr/local/opt/llvm/bin/clang-tidy
          elif [ -x /opt/homebrew/bin/clang-tidy ]; then
            echo /opt/homebrew/bin/clang-tidy
          elif [ -x /usr/local/bin/clang-tidy ]; then
            echo /usr/local/bin/clang-tidy
          elif [ -x /opt/homebrew/bin/brew ] && [ -x "$(/opt/homebrew/bin/brew --prefix llvm)/bin/clang-tidy" ]; then
            echo "$(/opt/homebrew/bin/brew --prefix llvm)/bin/clang-tidy"
          elif [ -x /usr/local/bin/brew ] && [ -x "$(/usr/local/bin/brew --prefix llvm)/bin/clang-tidy" ]; then
            echo "$(/usr/local/bin/brew --prefix llvm)/bin/clang-tidy"
          fi
    cmds:
      - cmake -B build/tidy -S . -G "{{.GENERATOR}}" -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - |
        if [ -z "{{.CLANG_TIDY}}" ]; then
          echo "clang-tidy not found; skipping tidy. Install LLVM (for example: brew install llvm) to enable this task."
          exit 0
        fi
        find cpp/ -name '*.cpp' ! -path '*/bindings/*' ! -path 'cpp/tests/*' -print0 | xargs -0 -n 1 -P "{{.TIDY_JOBS}}" "{{.CLANG_TIDY}}" -p build/tidy -quiet --extra-arg=-Wno-unknown-warning-option --extra-arg=-Wno-error=unknown-warning-option
    silent: false

  metrics:
    desc: Run radon to report cyclomatic complexity and maintainability index.
    cmds:
      - uv run radon cc src/ -s
      - uv run radon mi src/ -s
    silent: false

  docs-build:
    desc: Build the HTML documentation with Sphinx.
    cmds:
      - uv run python -m sphinx -b html docs/ docs/_build/html -W
    silent: false

  docs-serve:
    desc: Serve the documentation locally with auto-reload.
    cmds:
      - uv run sphinx-autobuild docs/ docs/_build/html
    silent: false

  clean:
    desc: Remove build artefacts (build/, docs/_build/).
    cmds:
      - rm -rf build/ docs/_build/
    silent: false

  ci-checks:
    desc: Run the local equivalent of CI checks from Task definitions.
    cmds:
      - task: build
      - task: lint-check
      - task: test-cpp
      - task: coverage-cpp
      - task: tidy
      - task: test-py
      - task: sanitize
      - task: docs-build
    silent: false

  default:
    desc: Run all quality checks (lint, test, docs).
    cmds:
      - task: install
      - task: lint
      - task: test
      - task: docs-build
    silent: false
