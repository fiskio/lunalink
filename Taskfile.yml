version: '3'

tasks:
  install:
    desc: Install or update project dependencies.
    cmd: uv sync --group dev

  build:
    desc: Force recompile the C++ extension.
    cmd: uv sync --group dev --reinstall-package lsis-afs

  install-hooks:
    desc: Install git hooks for pre-commit checks.
    cmds:
      - git config core.hooksPath .githooks
      - echo "Git hooks installed. Pre-commit checks will run automatically."

  test:
    desc: Rebuild C++ extension, then run C++ and Python tests.
    cmds:
      - task: build
      - task: test-cpp
      - uv run pytest
    silent: false

  test-cpp:
    desc: Build and run C++ unit tests with CTest (uses Ninja if available).
    vars:
      GENERATOR:
        sh: which ninja >/dev/null 2>&1 && echo "Ninja" || echo "Unix Makefiles"
    cmds:
      - cmake -B build/cpp-tests -S . -G "{{.GENERATOR}}" -DBUILD_PYTHON_BINDINGS=OFF -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug
      - cmake --build build/cpp-tests --parallel
      - ctest --test-dir build/cpp-tests --output-on-failure --parallel
    silent: false

  lint:
    desc: Run all static analysis tools (type checking, linting, formatting).
    cmds:
      - task: install
      - task: ty
      - task: ruff-fix
    silent: false

  ty:
    desc: Run type checking with ty.
    cmd: uv run ty check src/

  ruff-fix:
    desc: Run ruff to format and lint with auto-fix.
    cmds:
      - uv run ruff format .
      - uv run ruff check . --fix
    silent: false

  metrics:
    desc: Run radon to report cyclomatic complexity and maintainability index.
    cmds:
      - uv run radon cc src/ -s
      - uv run radon mi src/ -s
    silent: false

  docs-build:
    desc: Build the HTML documentation with Sphinx.
    cmds:
      - task: install
      - uv run sphinx-build -b html docs/ docs/_build/html -W
    silent: false

  docs-serve:
    desc: Serve the documentation locally with auto-reload.
    cmds:
      - task: install
      - uv run sphinx-autobuild docs/ docs/_build/html
    silent: false

  default:
    desc: Run all quality checks (lint, test, docs).
    cmds:
      - task: lint
      - task: test
      - task: docs-build
    silent: false
